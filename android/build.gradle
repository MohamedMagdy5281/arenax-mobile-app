buildscript {
    ext.kotlin_version = '2.2.21'   // ✅ Update Kotlin version here

    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:8.2.0"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version" // ✅ Add Kotlin plugin
    }
}

allprojects {
    repositories {
        maven {
            url "https://www.arthenica.com/maven"
        }
        google()
        mavenCentral()
        maven { url 'https://www.arthenica.com/maven'}
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(":app")
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}